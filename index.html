<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4AM — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1f1f1f;
    --border: #2a2a2a;
    --accent: #c8f544;
    --red: #ff3b3b;
    --blue: #3b82f6;
    --text: #f0f0f0;
    --muted: #666;
    --mono: 'DM Mono', monospace;
    --sans: 'Lato', sans-serif;
    --display: 'Bebas Neue', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 40px;
    height: 60px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }

  .logo {
    font-family: var(--display);
    font-size: 26px;
    letter-spacing: 3px;
    color: var(--accent);
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }
  .live-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    transition: all 0.3s;
  }
  .live-dot.on {
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .refresh-btn {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .refresh-btn:hover { color: var(--accent); border-color: var(--accent); }

  /* ── MAIN ── */
  main {
    padding: 36px 40px;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* ── PAGE TITLE ── */
  .page-header {
    margin-bottom: 32px;
    border-left: 3px solid var(--accent);
    padding-left: 20px;
  }
  .page-title {
    font-family: var(--display);
    font-size: 56px;
    letter-spacing: 3px;
    line-height: 1;
  }
  .page-meta {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
  }

  /* ── TABS ── */
  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 28px;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 12px 24px;
    background: transparent;
    border: none;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.2s;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab:hover:not(.active) { color: var(--text); }

  /* ── TAB SECTIONS ── */
  .tab-section { display: none; }
  .tab-section.active { display: block; }

  /* ── KPI CARDS ── */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }

  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 22px 24px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .kpi-card:hover { border-color: #444; }
  .kpi-card::before {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
  }
  .kpi-card:nth-child(1)::before { background: var(--accent); }
  .kpi-card:nth-child(2)::before { background: var(--blue); }
  .kpi-card:nth-child(3)::before { background: var(--red); }
  .kpi-card:nth-child(4)::before { background: #f59e0b; }

  .kpi-label {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 12px;
  }
  .kpi-value {
    font-family: var(--display);
    font-size: 40px;
    letter-spacing: 1px;
    line-height: 1;
    margin-bottom: 4px;
  }
  .kpi-sub {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }

  /* ── TABLE CARD ── */
  .table-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .table-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
  }
  .table-title {
    font-family: var(--display);
    font-size: 18px;
    letter-spacing: 1px;
  }
  .count-badge {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 3px 10px;
    border-radius: 20px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }
  thead th {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    padding: 10px 24px;
    text-align: left;
    background: rgba(255,255,255,0.02);
    border-bottom: 1px solid var(--border);
  }
  tbody td {
    padding: 13px 24px;
    font-size: 13px;
    border-bottom: 1px solid rgba(42,42,42,0.6);
    vertical-align: middle;
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: rgba(255,255,255,0.02); }

  .order-num {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent);
  }
  .customer-name { font-weight: 700; }
  .source-tag {
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .source-tiktok { background: rgba(255,255,255,0.08); color: #aaa; }
  .source-web { background: rgba(59,130,246,0.15); color: var(--blue); }
  .source-other { background: rgba(200,245,68,0.1); color: var(--accent); }

  .status-pill {
    font-family: var(--mono);
    font-size: 10px;
    padding: 3px 10px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .s-paid { background: rgba(200,245,68,0.1); color: var(--accent); border: 1px solid rgba(200,245,68,0.2); }
  .s-pending { background: rgba(245,158,11,0.1); color: #f59e0b; border: 1px solid rgba(245,158,11,0.2); }
  .s-refunded { background: rgba(255,59,59,0.1); color: var(--red); border: 1px solid rgba(255,59,59,0.2); }
  .s-fulfilled { background: rgba(59,130,246,0.1); color: var(--blue); border: 1px solid rgba(59,130,246,0.2); }

  .price { font-family: var(--mono); font-size: 13px; }

  /* ── SKELETON ── */
  .skeleton {
    background: linear-gradient(90deg, var(--surface2) 25%, var(--border) 50%, var(--surface2) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 4px;
  }
  @keyframes shimmer { 0% { background-position: 200% 0 } 100% { background-position: -200% 0 } }

  .empty-state {
    text-align: center;
    padding: 60px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 13px;
  }

  /* ── ERROR BANNER ── */
  .error-banner {
    background: rgba(255,59,59,0.08);
    border: 1px solid rgba(255,59,59,0.2);
    border-radius: 8px;
    padding: 14px 20px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--red);
    margin-bottom: 20px;
    display: none;
  }

  /* ── PRODUCT GRID ── */
  .product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 12px;
    padding: 20px 24px;
  }
  .product-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 18px;
    transition: border-color 0.2s;
  }
  .product-card:hover { border-color: #444; }
  .product-name { font-weight: 700; font-size: 14px; margin-bottom: 6px; }
  .product-type { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-bottom: 12px; text-transform: uppercase; }
  .product-meta { display: flex; align-items: center; justify-content: space-between; }
  .product-price { font-family: var(--mono); font-size: 14px; color: var(--accent); }
  .product-variants { font-family: var(--mono); font-size: 10px; color: var(--muted); }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    header { padding: 0 20px; }
    main { padding: 24px 20px; }
    .page-title { font-size: 40px; }
    thead th, tbody td { padding: 10px 16px; }
    .kpi-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">4AM SKIN</div>
  <div class="header-right">
    <div class="live-badge">
      <div class="live-dot" id="live-dot"></div>
      <span id="live-text">conectando...</span>
    </div>
    <button class="refresh-btn" onclick="loadAll()">↺ actualizar</button>
  </div>
</header>

<main>
  <div class="page-header">
    <div class="page-title">OVERVIEW</div>
    <div class="page-meta" id="page-meta">cargando datos...</div>
  </div>

  <div class="error-banner" id="error-banner"></div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('ventas', this)">Ventas</button>
    <button class="tab" onclick="showTab('productos', this)">Productos</button>
    <button class="tab" onclick="showTab('clientes', this)">Clientes</button>
  </div>

  <!-- VENTAS -->
  <div class="tab-section active" id="tab-ventas">
    <div class="kpi-grid" id="kpi-ventas">
      <div class="kpi-card"><div class="kpi-label">cargando</div><div class="skeleton" style="height:40px;width:80%;margin:8px 0"></div></div>
      <div class="kpi-card"><div class="kpi-label">cargando</div><div class="skeleton" style="height:40px;width:70%;margin:8px 0"></div></div>
      <div class="kpi-card"><div class="kpi-label">cargando</div><div class="skeleton" style="height:40px;width:60%;margin:8px 0"></div></div>
      <div class="kpi-card"><div class="kpi-label">cargando</div><div class="skeleton" style="height:40px;width:75%;margin:8px 0"></div></div>
    </div>
    <div class="table-card">
      <div class="table-top">
        <div class="table-title">ÚLTIMOS PEDIDOS</div>
        <div class="count-badge" id="orders-badge">—</div>
      </div>
      <div id="orders-wrap"><div class="empty-state">Cargando pedidos...</div></div>
    </div>
  </div>

  <!-- PRODUCTOS -->
  <div class="tab-section" id="tab-productos">
    <div class="kpi-grid" id="kpi-productos">
      <div class="kpi-card"><div class="kpi-label">cargando</div><div class="skeleton" style="height:40px;width:60%;margin:8px 0"></div></div>
      <div class="kpi-card"><div class="kpi-label">cargando</div><div class="skeleton" style="height:40px;width:80%;margin:8px 0"></div></div>
    </div>
    <div class="table-card">
      <div class="table-top">
        <div class="table-title">CATÁLOGO</div>
        <div class="count-badge" id="products-badge">—</div>
      </div>
      <div id="products-wrap"><div class="empty-state">Cargando productos...</div></div>
    </div>
  </div>

  <!-- CLIENTES -->
  <div class="tab-section" id="tab-clientes">
    <div class="kpi-grid" id="kpi-clientes">
      <div class="kpi-card"><div class="kpi-label">cargando</div><div class="skeleton" style="height:40px;width:70%;margin:8px 0"></div></div>
      <div class="kpi-card"><div class="kpi-label">cargando</div><div class="skeleton" style="height:40px;width:65%;margin:8px 0"></div></div>
    </div>
    <div class="table-card">
      <div class="table-top">
        <div class="table-title">CLIENTES RECIENTES</div>
        <div class="count-badge" id="customers-badge">—</div>
      </div>
      <div id="customers-wrap"><div class="empty-state">Cargando clientes...</div></div>
    </div>
  </div>
</main>

<script>
const WORKER = 'https://shopify-proxy.luciano-bd7.workers.dev';
const STORE  = '4am';

// ── TABS ──
function showTab(name, btn) {
  document.querySelectorAll('.tab-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
}

// ── STATUS ──
function setStatus(ok, msg) {
  const dot = document.getElementById('live-dot');
  const txt = document.getElementById('live-text');
  dot.className = 'live-dot' + (ok ? ' on' : '');
  txt.textContent = msg;
}

function showError(msg) {
  const el = document.getElementById('error-banner');
  el.style.display = 'block';
  el.textContent = '⚠ ' + msg;
}

// ── FETCH ──
async function api(endpoint, params = '') {
  const res = await fetch(`${WORKER}/${STORE}/${endpoint}${params}`);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

// ── LOAD ALL ──
async function loadAll() {
  setStatus(false, 'actualizando...');
  document.getElementById('error-banner').style.display = 'none';
  try {
    await Promise.all([loadOrders(), loadProducts(), loadCustomers()]);
    setStatus(true, 'en vivo · 4amskin.com');
    document.getElementById('page-meta').textContent =
      'Última actualización: ' + new Date().toLocaleTimeString('es-AR');
  } catch(e) {
    setStatus(false, 'error de conexión');
    showError('No se pudo conectar con Shopify. ' + e.message);
  }
}

// ── ORDERS ──
async function loadOrders() {
  const data = await api('orders', '?limit=50&status=any');
  const orders = data.orders || [];

  const total = orders.reduce((s, o) => s + parseFloat(o.total_price || 0), 0);
  const paid  = orders.filter(o => o.financial_status === 'paid').length;
  const tiktok = orders.filter(o => o.source_name === 'tiktok').length;
  const avg   = orders.length ? total / orders.length : 0;

  document.getElementById('kpi-ventas').innerHTML = `
    <div class="kpi-card">
      <div class="kpi-label">Ventas totales</div>
      <div class="kpi-value">$${fmt(total)}</div>
      <div class="kpi-sub">${orders.length} pedidos</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Pagados</div>
      <div class="kpi-value">${paid}</div>
      <div class="kpi-sub">de ${orders.length} pedidos</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">TikTok Shop</div>
      <div class="kpi-value">${tiktok}</div>
      <div class="kpi-sub">${orders.length ? Math.round(tiktok/orders.length*100) : 0}% del total</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Ticket promedio</div>
      <div class="kpi-value">$${fmt(avg)}</div>
      <div class="kpi-sub">por pedido</div>
    </div>
  `;

  document.getElementById('orders-badge').textContent = orders.length + ' pedidos';
  document.getElementById('orders-wrap').innerHTML = renderOrders(orders.slice(0, 30));
}

function renderOrders(orders) {
  if (!orders.length) return '<div class="empty-state">Sin pedidos</div>';
  const statusClass = { paid: 's-paid', pending: 's-pending', refunded: 's-refunded' };
  return `<table>
    <thead><tr>
      <th>#</th><th>Cliente</th><th>Producto</th><th>Canal</th><th>Estado</th><th>Fecha</th><th>Total</th>
    </tr></thead>
    <tbody>
    ${orders.map(o => {
      const sc = statusClass[o.financial_status] || 's-fulfilled';
      const src = o.source_name === 'tiktok' ? 'source-tiktok' : o.source_name === 'web' ? 'source-web' : 'source-other';
      const srcLabel = o.source_name === 'tiktok' ? 'TikTok' : o.source_name === 'web' ? 'Web' : o.source_name || '—';
      const item = o.line_items?.[0]?.title || '—';
      const customer = o.customer ? `${o.customer.first_name} ${o.customer.last_name}` : 'Invitado';
      return `<tr>
        <td class="order-num">#${o.order_number}</td>
        <td class="customer-name">${customer}</td>
        <td style="color:var(--muted);font-size:12px">${item}${o.line_items?.length > 1 ? ` +${o.line_items.length-1}` : ''}</td>
        <td><span class="source-tag ${src}">${srcLabel}</span></td>
        <td><span class="status-pill ${sc}">${o.financial_status}</span></td>
        <td style="font-family:var(--mono);font-size:11px;color:var(--muted)">${fmtDate(o.created_at)}</td>
        <td class="price">$${fmt(o.total_price)}</td>
      </tr>`;
    }).join('')}
    </tbody></table>`;
}

// ── PRODUCTS ──
async function loadProducts() {
  const data = await api('products', '?limit=50');
  const products = data.products || [];

  const active   = products.filter(p => p.status === 'active').length;
  const variants = products.reduce((s, p) => s + (p.variants?.length || 0), 0);

  document.getElementById('kpi-productos').innerHTML = `
    <div class="kpi-card">
      <div class="kpi-label">Total productos</div>
      <div class="kpi-value">${products.length}</div>
      <div class="kpi-sub">${active} activos</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Variantes</div>
      <div class="kpi-value">${variants}</div>
      <div class="kpi-sub">en catálogo</div>
    </div>
  `;

  document.getElementById('products-badge').textContent = products.length + ' productos';
  document.getElementById('products-wrap').innerHTML = renderProducts(products);
}

function renderProducts(products) {
  if (!products.length) return '<div class="empty-state">Sin productos</div>';
  return `<div class="product-grid">${products.map(p => {
    const minPrice = Math.min(...(p.variants || []).map(v => parseFloat(v.price || 0)));
    return `<div class="product-card">
      <div class="product-name">${p.title}</div>
      <div class="product-type">${p.product_type || 'Sin tipo'}</div>
      <div class="product-meta">
        <span class="product-price">$${fmt(minPrice)}</span>
        <span class="product-variants">${p.variants?.length || 0} var.</span>
        <span class="status-pill ${p.status === 'active' ? 's-paid' : 's-pending'}">${p.status}</span>
      </div>
    </div>`;
  }).join('')}</div>`;
}

// ── CUSTOMERS ──
async function loadCustomers() {
  const data = await api('customers', '?limit=50');
  const customers = data.customers || [];

  const withOrders = customers.filter(c => c.orders_count > 0).length;
  const totalSpent = customers.reduce((s, c) => s + parseFloat(c.total_spent || 0), 0);

  document.getElementById('kpi-clientes').innerHTML = `
    <div class="kpi-card">
      <div class="kpi-label">Total clientes</div>
      <div class="kpi-value">${customers.length}</div>
      <div class="kpi-sub">${withOrders} con pedidos</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">LTV acumulado</div>
      <div class="kpi-value">$${fmt(totalSpent)}</div>
      <div class="kpi-sub">lifetime value</div>
    </div>
  `;

  document.getElementById('customers-badge').textContent = customers.length + ' clientes';
  document.getElementById('customers-wrap').innerHTML = renderCustomers(customers.slice(0, 30));
}

function renderCustomers(customers) {
  if (!customers.length) return '<div class="empty-state">Sin clientes</div>';
  return `<table>
    <thead><tr>
      <th>Nombre</th><th>Email</th><th>Ciudad</th><th>Pedidos</th><th>Total gastado</th>
    </tr></thead>
    <tbody>
    ${customers.map(c => `<tr>
      <td class="customer-name">${c.first_name} ${c.last_name}</td>
      <td style="font-family:var(--mono);font-size:11px;color:var(--muted)">${c.email || '—'}</td>
      <td style="font-size:12px;color:var(--muted)">${c.default_address?.city || '—'}</td>
      <td style="font-family:var(--mono);font-size:12px">${c.orders_count}</td>
      <td class="price">$${fmt(c.total_spent)}</td>
    </tr>`).join('')}
    </tbody></table>`;
}

// ── HELPERS ──
function fmt(n) {
  return parseFloat(n || 0).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}
function fmtDate(d) {
  return new Date(d).toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit', year: '2-digit' });
}

// ── INIT ──
loadAll();
// Auto-refresh cada 5 minutos
setInterval(loadAll, 5 * 60 * 1000);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4AM Skin — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,400;0,500;1,400&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0d0d; --surface: #161616; --surface2: #1f1f1f; --border: #2a2a2a;
  --accent: #c8f544; --red: #ff3b3b; --blue: #3b82f6; --text: #f0f0f0; --muted: #666;
  --mono: 'DM Mono', monospace; --sans: 'Lato', sans-serif; --display: 'Bebas Neue', sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; }
header { display: flex; align-items: center; justify-content: space-between; padding: 0 40px; height: 60px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 100; }
.logo { font-family: var(--display); font-size: 26px; letter-spacing: 3px; color: var(--accent); }
.header-right { display: flex; align-items: center; gap: 16px; }
.live-badge { display: flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 11px; color: var(--muted); }
.live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); transition: all 0.3s; }
.live-dot.on { background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
.refresh-btn { font-family: var(--mono); font-size: 11px; color: var(--muted); background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 6px 14px; cursor: pointer; transition: all 0.2s; }
.refresh-btn:hover { color: var(--accent); border-color: var(--accent); }
.refresh-btn:disabled { opacity: 0.4; cursor: not-allowed; }
#loading-bar { position: fixed; top: 60px; left: 0; height: 2px; background: var(--accent); width: 0%; transition: width 0.4s ease; z-index: 200; }
main { padding: 36px 40px; max-width: 1400px; margin: 0 auto; }
.page-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 16px; }
.page-title { font-family: var(--display); font-size: 56px; letter-spacing: 3px; line-height: 1; border-left: 3px solid var(--accent); padding-left: 20px; }
.page-meta { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-top: 6px; padding-left: 23px; }
.date-bar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px 16px; margin-bottom: 24px; }
.date-bar label { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-right: 4px; }
.period-btn { font-family: var(--mono); font-size: 11px; padding: 5px 14px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.2s; }
.period-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: bold; }
.period-btn:hover:not(.active) { border-color: #444; color: var(--text); }
.date-sep { color: var(--border); font-size: 18px; }
.custom-date { font-family: var(--mono); font-size: 11px; padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); cursor: pointer; color-scheme: dark; }
.orders-fetched { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-left: auto; }
#fetch-status { font-family: var(--mono); font-size: 11px; color: var(--accent); margin-left: 4px; }
.tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
.tab { font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; padding: 12px 24px; background: transparent; border: none; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.2s; }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab:hover:not(.active) { color: var(--text); }
.tab-section { display: none; }
.tab-section.active { display: block; }
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 24px; }
.kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 22px 24px; position: relative; overflow: hidden; transition: border-color 0.2s; }
.kpi-card:hover { border-color: #444; }
.kpi-card::before { content:''; position:absolute; bottom:0;left:0;right:0;height:2px; }
.kpi-card:nth-child(1)::before{background:var(--accent)} .kpi-card:nth-child(2)::before{background:var(--blue)} .kpi-card:nth-child(3)::before{background:var(--red)} .kpi-card:nth-child(4)::before{background:#f59e0b}
.kpi-label { font-family:var(--mono); font-size:10px; text-transform:uppercase; letter-spacing:0.1em; color:var(--muted); margin-bottom:12px; }
.kpi-value { font-family:var(--display); font-size:40px; letter-spacing:1px; line-height:1; margin-bottom:4px; }
.kpi-sub { font-family:var(--mono); font-size:11px; color:var(--muted); }
.table-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
.table-top { display:flex; align-items:center; justify-content:space-between; padding:18px 24px; border-bottom:1px solid var(--border); gap: 12px; flex-wrap: wrap; }
.table-title { font-family:var(--display); font-size:18px; letter-spacing:1px; }
.count-badge { font-family:var(--mono); font-size:11px; color:var(--muted); background:var(--surface2); border:1px solid var(--border); padding:3px 10px; border-radius:20px; }
.search-input { font-family: var(--mono); font-size: 12px; padding: 5px 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); outline: none; width: 200px; transition: border-color 0.2s; }
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--muted); }
table { width:100%; border-collapse:collapse; }
thead th { font-family:var(--mono); font-size:10px; text-transform:uppercase; letter-spacing:0.08em; color:var(--muted); padding:10px 24px; text-align:left; background:rgba(255,255,255,0.02); border-bottom:1px solid var(--border); cursor: pointer; user-select: none; white-space: nowrap; }
thead th:hover { color: var(--text); }
thead th.sort-asc::after { content: ' ↑'; color: var(--accent); }
thead th.sort-desc::after { content: ' ↓'; color: var(--accent); }
tbody td { padding:13px 24px; font-size:13px; border-bottom:1px solid rgba(42,42,42,0.6); vertical-align:middle; }
tbody tr:last-child td { border-bottom:none; }
tbody tr:hover td { background:rgba(255,255,255,0.02); }
.order-num { font-family:var(--mono); font-size:12px; color:var(--accent); }
.customer-name { font-weight:700; }
.source-tag { font-family:var(--mono); font-size:10px; padding:2px 8px; border-radius:4px; text-transform:uppercase; letter-spacing:0.05em; }
.source-tiktok { background:rgba(255,255,255,0.08); color:#aaa; }
.source-web { background:rgba(59,130,246,0.15); color:var(--blue); }
.source-other { background:rgba(200,245,68,0.1); color:var(--accent); }
.status-pill { font-family:var(--mono); font-size:10px; padding:3px 10px; border-radius:20px; text-transform:uppercase; letter-spacing:0.05em; }
.s-paid { background:rgba(200,245,68,0.1); color:var(--accent); border:1px solid rgba(200,245,68,0.2); }
.s-pending { background:rgba(245,158,11,0.1); color:#f59e0b; border:1px solid rgba(245,158,11,0.2); }
.s-refunded { background:rgba(255,59,59,0.1); color:var(--red); border:1px solid rgba(255,59,59,0.2); }
.price { font-family:var(--mono); font-size:13px; }
.pagination { display:flex; align-items:center; justify-content:center; gap:8px; padding:16px; border-top:1px solid var(--border); }
.page-btn { font-family:var(--mono); font-size:11px; padding:5px 12px; border:1px solid var(--border); border-radius:6px; background:transparent; color:var(--muted); cursor:pointer; transition:all 0.2s; }
.page-btn:hover:not(:disabled) { border-color:var(--accent); color:var(--accent); }
.page-btn:disabled { opacity:0.3; cursor:not-allowed; }
.page-info { font-family:var(--mono); font-size:11px; color:var(--muted); }
.skeleton { background:linear-gradient(90deg,var(--surface2) 25%,var(--border) 50%,var(--surface2) 75%); background-size:200% 100%; animation:shimmer 1.4s infinite; border-radius:4px; }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
.empty-state { text-align:center; padding:60px; color:var(--muted); font-family:var(--mono); font-size:13px; }
.error-banner { background:rgba(255,59,59,0.08); border:1px solid rgba(255,59,59,0.2); border-radius:8px; padding:14px 20px; font-family:var(--mono); font-size:12px; color:var(--red); margin-bottom:20px; display:none; }
.product-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:12px; padding:20px 24px; }
.product-card { background:var(--surface2); border:1px solid var(--border); border-radius:8px; padding:18px; transition:border-color 0.2s; }
.product-card:hover { border-color:#444; }
.product-name { font-weight:700; font-size:14px; margin-bottom:6px; }
.product-type { font-family:var(--mono); font-size:10px; color:var(--muted); margin-bottom:12px; text-transform:uppercase; }
.product-meta { display:flex; align-items:center; justify-content:space-between; }
.product-price { font-family:var(--mono); font-size:14px; color:var(--accent); }
.product-variants { font-family:var(--mono); font-size:10px; color:var(--muted); }
@media(max-width:768px){ header{padding:0 20px} main{padding:24px 20px} .page-title{font-size:40px} thead th,tbody td{padding:10px 16px} .kpi-grid{grid-template-columns:1fr 1fr} }
</style>
</head>
<body>

<div id="loading-bar"></div>

<header>
  <div class="logo">4AM SKIN</div>
  <div class="header-right">
    <div class="live-badge">
      <div class="live-dot" id="live-dot"></div>
      <span id="live-text">connecting...</span>
    </div>
    <button class="refresh-btn" id="refresh-btn" onclick="loadAll()">↺ refresh</button>
  </div>
</header>

<main>
  <div class="page-header">
    <div>
      <div class="page-title">OVERVIEW</div>
      <div class="page-meta" id="page-meta">loading data...</div>
    </div>
  </div>

  <div class="error-banner" id="error-banner"></div>

  <div class="date-bar">
    <label>Period</label>
    <button class="period-btn" onclick="setPeriod(1, this)">Today</button>
    <button class="period-btn" onclick="setPeriod(7, this)">7D</button>
    <button class="period-btn active" onclick="setPeriod(30, this)">30D</button>
    <button class="period-btn" onclick="setPeriod(90, this)">90D</button>
    <button class="period-btn" onclick="setPeriod(365, this)">1Y</button>
    <button class="period-btn" onclick="setPeriod(0, this)">All time</button>
    <div class="date-sep">|</div>
    <label>From</label>
    <input type="date" class="custom-date" id="date-from" onchange="setCustomDate()">
    <label>To</label>
    <input type="date" class="custom-date" id="date-to" onchange="setCustomDate()">
    <span class="orders-fetched" id="orders-fetched"></span>
    <span id="fetch-status"></span>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('sales', this)">Sales</button>
    <button class="tab" onclick="showTab('products', this)">Products</button>
    <button class="tab" onclick="showTab('customers', this)">Customers</button>
  </div>

  <div class="tab-section active" id="tab-sales">
    <div class="kpi-grid" id="kpi-sales">
      <div class="kpi-card"><div class="kpi-label">loading</div><div class="skeleton" style="height:40px;width:80%;margin:8px 0"></div></div>
      <div class="kpi-card"><div class="kpi-label">loading</div><div class="skeleton" style="height:40px;width:70%;margin:8px 0"></div></div>
      <div class="kpi-card"><div class="kpi-label">loading</div><div class="skeleton" style="height:40px;width:60%;margin:8px 0"></div></div>
      <div class="kpi-card"><div class="kpi-label">loading</div><div class="skeleton" style="height:40px;width:75%;margin:8px 0"></div></div>
    </div>
    <div class="table-card">
      <div class="table-top">
        <div class="table-title">ORDERS</div>
        <input type="text" class="search-input" placeholder="Search customer, order..." oninput="filterOrders(this.value)" id="order-search">
        <div class="count-badge" id="orders-badge">—</div>
      </div>
      <div id="orders-wrap"><div class="empty-state">Loading orders...</div></div>
    </div>
  </div>

  <div class="tab-section" id="tab-products">
    <div class="kpi-grid" id="kpi-products">
      <div class="kpi-card"><div class="kpi-label">loading</div><div class="skeleton" style="height:40px;width:60%;margin:8px 0"></div></div>
      <div class="kpi-card"><div class="kpi-label">loading</div><div class="skeleton" style="height:40px;width:80%;margin:8px 0"></div></div>
    </div>
    <div class="table-card">
      <div class="table-top">
        <div class="table-title">CATALOG</div>
        <div class="count-badge" id="products-badge">—</div>
      </div>
      <div id="products-wrap"><div class="empty-state">Loading products...</div></div>
    </div>
  </div>

  <div class="tab-section" id="tab-customers">
    <div class="kpi-grid" id="kpi-customers">
      <div class="kpi-card"><div class="kpi-label">loading</div><div class="skeleton" style="height:40px;width:70%;margin:8px 0"></div></div>
      <div class="kpi-card"><div class="kpi-label">loading</div><div class="skeleton" style="height:40px;width:65%;margin:8px 0"></div></div>
    </div>
    <div class="table-card">
      <div class="table-top">
        <div class="table-title">CUSTOMERS</div>
        <div class="count-badge" id="customers-badge">—</div>
      </div>
      <div id="customers-wrap"><div class="empty-state">Loading customers...</div></div>
    </div>
  </div>
</main>

<script>
const WORKER = 'https://shopify-proxy.luciano-bd7.workers.dev';
const STORE = '4am';
const PAGE_SIZE = 25;

let allOrders = [], filteredOrders = [], allProducts = [], allCustomers = [];
let currentPage = 1;
let sortCol = null, sortDir = 1;
let searchTerm = '';

function initDates() {
  const to = new Date();
  const from = new Date();
  from.setDate(from.getDate() - 30);
  document.getElementById('date-to').value = to.toISOString().split('T')[0];
  document.getElementById('date-from').value = from.toISOString().split('T')[0];
}

function setPeriod(days, btn) {
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const to = new Date();
  const from = new Date();
  if (days > 0) from.setDate(from.getDate() - days);
  else from.setFullYear(2000);
  document.getElementById('date-to').value = to.toISOString().split('T')[0];
  document.getElementById('date-from').value = from.toISOString().split('T')[0];
  loadAll();
}

function setCustomDate() {
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  loadAll();
}

function showTab(name, btn) {
  document.querySelectorAll('.tab-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
}

function setStatus(ok, msg) {
  document.getElementById('live-dot').className = 'live-dot' + (ok ? ' on' : '');
  document.getElementById('live-text').textContent = msg;
}
function setProgress(pct) { document.getElementById('loading-bar').style.width = pct + '%'; }
function showError(msg) {
  const el = document.getElementById('error-banner');
  el.style.display = 'block';
  el.textContent = '⚠ ' + msg;
}
function setFetchStatus(msg) { document.getElementById('fetch-status').textContent = msg; }

// ── PARSE LINK HEADER ──
// El Worker expone el Link header de Shopify como _link en el JSON.
// Formato: <https://tienda.myshopify.com/admin/api/.../orders.json?page_info=XYZ&limit=250>; rel="next"
function parseNextPageInfo(linkHeader) {
  if (!linkHeader) return null;
  for (const part of linkHeader.split(',')) {
    const match = part.match(/<([^>]+)>;\s*rel="next"/);
    if (match) {
      try {
        return new URL(match[1]).searchParams.get('page_info');
      } catch { return null; }
    }
  }
  return null;
}

// ── FETCH CON PAGINACIÓN COMPLETA POR CURSORES ──
// Shopify REST usa cursor-based pagination:
//   - Primera página: parámetros normales (limit, status, fechas)
//   - Páginas siguientes: SOLO limit + page_info (no se pueden mezclar otros filtros)
// El Worker devuelve el Link header de Shopify dentro del JSON como _link.
async function fetchAllPaginated(endpoint, key, fromDate, toDate) {
  const results = [];
  let pageInfo = null;
  const isOrders = (endpoint === 'orders');

  while (true) {
    const params = new URLSearchParams();

    if (pageInfo) {
      // Con page_info: solo limit y page_info, sin ningún otro filtro
      params.set('limit', '250');
      params.set('page_info', pageInfo);
    } else {
      // Primera página
      params.set('limit', '250');
      params.set('status', 'any');
      if (isOrders && fromDate && toDate) {
        params.set('created_at_min', fromDate + 'T00:00:00-03:00');
        params.set('created_at_max', toDate + 'T23:59:59-03:00');
      }
    }

    const url = `${WORKER}/${STORE}/${endpoint}?${params.toString()}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status} fetching ${endpoint}`);

    const data = await res.json();
    const items = data[key] || [];
    results.push(...items);

    // Mostrar progreso en vivo mientras pagina
    setFetchStatus(`loading ${key}... ${results.length}`);

    // Leer el cursor de la próxima página desde _link (que el Worker copio del header Link)
    pageInfo = parseNextPageInfo(data._link);

    // Sin más páginas o página vacía → terminamos
    if (!pageInfo || items.length === 0) break;

    // Pausa para respetar el rate limit de Shopify (REST: ~2 req/s)
    await new Promise(r => setTimeout(r, 500));
  }

  return results;
}

// ── LOAD ALL ──
async function loadAll() {
  const btn = document.getElementById('refresh-btn');
  btn.disabled = true;
  btn.textContent = '↺ loading...';
  setStatus(false, 'fetching data...');
  setProgress(10);
  setFetchStatus('');
  document.getElementById('error-banner').style.display = 'none';

  const fromDate = document.getElementById('date-from').value;
  const toDate = document.getElementById('date-to').value;

  try {
    allOrders = await fetchAllPaginated('orders', 'orders', fromDate, toDate);
    setProgress(50);

    allProducts = await fetchAllPaginated('products', 'products');
    setProgress(75);

    allCustomers = await fetchAllPaginated('customers', 'customers');
    setProgress(100);

    filteredOrders = allOrders;
    currentPage = 1;
    searchTerm = '';
    document.getElementById('order-search').value = '';
    document.getElementById('orders-fetched').textContent = `${allOrders.length} orders fetched`;
    setFetchStatus('');

    renderSalesKPI();
    renderOrdersTable();
    renderProducts();
    renderCustomers();

    setStatus(true, 'live · 4amskin.com');
    document.getElementById('page-meta').textContent =
      `Last updated: ${new Date().toLocaleTimeString('en-US')} · ${allOrders.length} orders in period`;
    setTimeout(() => setProgress(0), 600);
  } catch(e) {
    setStatus(false, 'connection error');
    showError('Could not connect to Shopify. ' + e.message);
    setFetchStatus('');
    setProgress(0);
  } finally {
    btn.disabled = false;
    btn.textContent = '↺ refresh';
  }
}

function renderSalesKPI() {
  const orders = filteredOrders;
  const total = orders.reduce((s, o) => s + parseFloat(o.total_price || 0), 0);
  const paid = orders.filter(o => o.financial_status === 'paid').length;
  const tiktok = orders.filter(o => o.source_name === 'tiktok').length;
  const avg = orders.length ? total / orders.length : 0;
  document.getElementById('kpi-sales').innerHTML = `
    <div class="kpi-card"><div class="kpi-label">Total Revenue</div><div class="kpi-value">$${fmt(total)}</div><div class="kpi-sub">${orders.length} orders</div></div>
    <div class="kpi-card"><div class="kpi-label">Paid Orders</div><div class="kpi-value">${paid}</div><div class="kpi-sub">of ${orders.length} orders</div></div>
    <div class="kpi-card"><div class="kpi-label">TikTok Shop</div><div class="kpi-value">${tiktok}</div><div class="kpi-sub">${orders.length ? Math.round(tiktok/orders.length*100) : 0}% of total</div></div>
    <div class="kpi-card"><div class="kpi-label">Avg. Order Value</div><div class="kpi-value">$${fmt(avg)}</div><div class="kpi-sub">per order</div></div>`;
}

function filterOrders(val) { searchTerm = val.toLowerCase(); currentPage = 1; renderOrdersTable(); }

function renderOrdersTable() {
  let orders = filteredOrders;
  if (searchTerm) {
    orders = orders.filter(o => {
      const name = o.customer ? `${o.customer.first_name} ${o.customer.last_name}`.toLowerCase() : '';
      return name.includes(searchTerm) || String(o.order_number).includes(searchTerm);
    });
  }
  if (sortCol !== null) {
    orders = [...orders].sort((a, b) => {
      let va, vb;
      if (sortCol === 'total') { va = parseFloat(a.total_price); vb = parseFloat(b.total_price); }
      else if (sortCol === 'date') { va = new Date(a.created_at); vb = new Date(b.created_at); }
      else if (sortCol === 'num') { va = a.order_number; vb = b.order_number; }
      return (va > vb ? 1 : -1) * sortDir;
    });
  }
  const total = orders.length;
  const pages = Math.ceil(total / PAGE_SIZE);
  const slice = orders.slice((currentPage-1)*PAGE_SIZE, currentPage*PAGE_SIZE);
  document.getElementById('orders-badge').textContent = `${total} orders`;
  if (!slice.length) {
    document.getElementById('orders-wrap').innerHTML = '<div class="empty-state">No orders found for this period.</div>';
    return;
  }
  const statusClass = { paid:'s-paid', pending:'s-pending', refunded:'s-refunded' };
  let html = `<table><thead><tr>
    <th onclick="sortBy('num')" class="${sortCol==='num'?(sortDir>0?'sort-asc':'sort-desc'):''}">#</th>
    <th>Customer</th><th>Product</th><th>Channel</th><th>Status</th>
    <th onclick="sortBy('date')" class="${sortCol==='date'?(sortDir>0?'sort-asc':'sort-desc'):''}">Date</th>
    <th onclick="sortBy('total')" class="${sortCol==='total'?(sortDir>0?'sort-asc':'sort-desc'):''}">Total</th>
  </tr></thead><tbody>
  ${slice.map(o => {
    const sc = statusClass[o.financial_status] || 's-pending';
    const src = o.source_name === 'tiktok' ? 'source-tiktok' : o.source_name === 'web' ? 'source-web' : 'source-other';
    const srcLabel = o.source_name === 'tiktok' ? 'TikTok' : o.source_name === 'web' ? 'Web' : o.source_name || '—';
    const item = o.line_items?.[0]?.title || '—';
    const customer = o.customer ? `${o.customer.first_name} ${o.customer.last_name}` : 'Guest';
    return `<tr>
      <td class="order-num">#${o.order_number}</td>
      <td class="customer-name">${customer}</td>
      <td style="color:var(--muted);font-size:12px">${item}${o.line_items?.length>1?` +${o.line_items.length-1}`:''}</td>
      <td><span class="source-tag ${src}">${srcLabel}</span></td>
      <td><span class="status-pill ${sc}">${o.financial_status}</span></td>
      <td style="font-family:var(--mono);font-size:11px;color:var(--muted)">${fmtDate(o.created_at)}</td>
      <td class="price">$${fmt(o.total_price)}</td>
    </tr>`;
  }).join('')}</tbody></table>`;
  if (pages > 1) {
    html += `<div class="pagination">
      <button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>← Prev</button>
      <span class="page-info">Page ${currentPage} of ${pages}</span>
      <button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===pages?'disabled':''}>Next →</button>
    </div>`;
  }
  document.getElementById('orders-wrap').innerHTML = html;
}

function sortBy(col) {
  if (sortCol === col) sortDir *= -1; else { sortCol = col; sortDir = -1; }
  renderOrdersTable();
}
function goPage(p) {
  currentPage = p; renderOrdersTable();
  document.querySelector('.table-card').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function renderProducts() {
  const products = allProducts;
  const active = products.filter(p => p.status === 'active').length;
  const variants = products.reduce((s, p) => s + (p.variants?.length || 0), 0);
  document.getElementById('kpi-products').innerHTML = `
    <div class="kpi-card"><div class="kpi-label">Total Products</div><div class="kpi-value">${products.length}</div><div class="kpi-sub">${active} active</div></div>
    <div class="kpi-card"><div class="kpi-label">Variants</div><div class="kpi-value">${variants}</div><div class="kpi-sub">in catalog</div></div>`;
  document.getElementById('products-badge').textContent = products.length + ' products';
  document.getElementById('products-wrap').innerHTML = products.length
    ? `<div class="product-grid">${products.map(p => {
        const minPrice = Math.min(...(p.variants||[]).map(v => parseFloat(v.price||0)));
        return `<div class="product-card">
          <div class="product-name">${p.title}</div>
          <div class="product-type">${p.product_type||'No type'}</div>
          <div class="product-meta">
            <span class="product-price">$${fmt(minPrice)}</span>
            <span class="product-variants">${p.variants?.length||0} var.</span>
            <span class="status-pill ${p.status==='active'?'s-paid':'s-pending'}">${p.status}</span>
          </div></div>`;
      }).join('')}</div>`
    : '<div class="empty-state">No products found.</div>';
}

function renderCustomers() {
  const customers = allCustomers;
  const withOrders = customers.filter(c => c.orders_count > 0).length;
  const totalSpent = customers.reduce((s, c) => s + parseFloat(c.total_spent||0), 0);
  document.getElementById('kpi-customers').innerHTML = `
    <div class="kpi-card"><div class="kpi-label">Total Customers</div><div class="kpi-value">${customers.length}</div><div class="kpi-sub">${withOrders} with orders</div></div>
    <div class="kpi-card"><div class="kpi-label">Total LTV</div><div class="kpi-value">$${fmt(totalSpent)}</div><div class="kpi-sub">lifetime value</div></div>`;
  document.getElementById('customers-badge').textContent = customers.length + ' customers';
  // FIX: era .slice(0,100) — ahora muestra todos los customers
  document.getElementById('customers-wrap').innerHTML = customers.length
    ? `<table><thead><tr><th>Name</th><th>Email</th><th>City</th><th>Orders</th><th>Total Spent</th></tr></thead>
      <tbody>${customers.map(c => `<tr>
        <td class="customer-name">${c.first_name} ${c.last_name}</td>
        <td style="font-family:var(--mono);font-size:11px;color:var(--muted)">${c.email||'—'}</td>
        <td style="font-size:12px;color:var(--muted)">${c.default_address?.city||'—'}</td>
        <td style="font-family:var(--mono);font-size:12px">${c.orders_count}</td>
        <td class="price">$${fmt(c.total_spent)}</td>
      </tr>`).join('')}</tbody></table>`
    : '<div class="empty-state">No customers found.</div>';
}

function fmt(n) { return parseFloat(n||0).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0}); }
function fmtDate(d) { return new Date(d).toLocaleDateString('en-US',{month:'2-digit',day:'2-digit',year:'2-digit'}); }

initDates();
loadAll();
setInterval(loadAll, 5 * 60 * 1000);
</script>
</body>
</html>
